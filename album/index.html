<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Paoheng 實驗室的照片與觀察紀錄。">
  <title>實驗相本｜Paoheng Lab</title>
  <style>
    :root{--bg:#faf8f3;--paper:#fffdf8;--ink:#1c1d1b;--muted:#696a64;--accent:#7b4f34;--line:#ded8cd}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.8}
    header,main,footer{width:min(1040px,calc(100% - 40px));margin:auto}
    header{padding:38px 0 26px;border-bottom:1px solid var(--line)}
    .brand{color:var(--ink);text-decoration:none;font-weight:700}
    h1{font-size:clamp(34px,7vw,60px);line-height:1.2;margin:22px 0 8px}
    .lead{color:var(--muted);margin:0;max-width:620px}
    main{padding:36px 0 72px}
    .empty{background:var(--paper);border:1px dashed #c9c0b3;border-radius:20px;padding:clamp(34px,8vw,80px) 24px;text-align:center}
    .empty-icon{font-size:52px;line-height:1;margin-bottom:18px}
    .empty h2{margin:0 0 8px;font-size:26px}
    .empty p{color:var(--muted);margin:0 auto;max-width:520px}
    .how{margin-top:18px;font-size:14px}
    footer{border-top:1px solid var(--line);padding:24px 0 48px;color:var(--muted);font-size:14px}
  </style>
</head>
<body>
  <header>
    <a class="brand" href="../">← Paoheng Lab｜認真無聊</a>
    <h1>實驗相本</h1>
    <p class="lead">照片不一定偉大，記下來就可能變成一場小實驗。</p>
  </header>
  <main>
    <section class="empty" aria-label="相本目前沒有照片">
      <div class="empty-icon" aria-hidden="true">☕</div>
      <h2>第一張照片還在路上</h2>
      <p>這裡將收藏照片、拍攝日期與一小段描述。相片由 Paoheng 上傳，再由 ChatGPT 整理與發布。</p>
      <p class="how">新增方式：把照片、描述與日期交給 ChatGPT，AI 會自動加入相本。</p>
    </section>
  </main>
  <footer>© 2026 Paoheng Lab · 本站程式碼由 ChatGPT 產生。</footer>
</body>
</html>
