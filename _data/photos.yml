  alt: 嘉義棒球場旁的 KANO 巨型棒球裝置，草地上有遊客停留拍照
  width: 1000
  height: 667
  description: KANO 是「嘉義農林學校」棒球隊的簡稱。1931 年，嘉農首度進軍日本夏季甲子園便勇奪亞軍，讓嘉義成為臺灣棒球史的重要起點。
  context: 因此，嘉義棒球場旁的 KANO 裝置，不只是地名標誌，也是在紀念嘉農球員跨越族群、堅持到底的棒球精神。
  quote: 一顆不能投、不能打的巨大棒球，裝著嘉義近百年的棒球記憶。
  photographer: Paoheng
  tags: [嘉義, 棒球, KANO, 城市風景, 日常觀察]

