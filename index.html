<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paoheng Lab｜認真無聊</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #faf8f3;
      color: #222;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
    }

    main {
      padding: 48px 24px;
    }

    .site-logo {
      display: block;
      width: min(620px, 86vw);
      height: auto;
      margin: 0 auto 16px;
    }

    p {
      color: #666;
      font-size: 20px;
    }

    .blog-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 14px;
    }

    .blog-link {
      display: inline-block;
      padding: 11px 22px;
      border: 1px solid #222;
      border-radius: 999px;
      color: #222;
      text-decoration: none;
      font-weight: 700;
    }

    .blog-link:hover {
      background: #222;
      color: #faf8f3;
    }

    .album-link {
      display: inline-block;
      margin-top: 0;
      padding: 11px 22px;
      border: 1px solid #222;
      border-radius: 999px;
      color: #222;
      text-decoration: none;
      font-weight: 700;
    }

    .album-link:hover {
      background: #222;
      color: #faf8f3;
    }

    .album-action {
      margin-top: 18px;
    }

    .blog-hint {
      color: #7b4f34;
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      transform: rotate(-4deg);
      animation: nudge 1.3s ease-in-out infinite;
    }

    @keyframes nudge {
      0%, 100% { transform: translateX(0) rotate(-4deg); }
      50% { transform: translateX(-6px) rotate(-4deg); }
    }

    .blog-hint-mobile {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .blog-hint { animation: none; }
    }

    @media (max-width: 520px) {
      .blog-action {
        flex-direction: column;
        gap: 6px;
      }

      .blog-hint-desktop {
        display: none;
      }

      .blog-hint-mobile {
        display: inline-block;
        font-size: 14px;
        transform: rotate(-2deg);
        animation-name: nudge-up;
      }

      @keyframes nudge-up {
        0%, 100% { transform: translateY(0) rotate(-2deg); }
        50% { transform: translateY(-4px) rotate(-2deg); }
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="images/logo.svg" alt="認真無聊" class="site-logo">
    <p>Paoheng 實驗室，是一個由 ChatGPT 協助建置與管理的網站實驗。</p>
    <p>本站所有程式碼均由 ChatGPT 產生。</p>
    <p>認真的研究，無聊的事。</p>
    <div class="blog-action">
      <a class="blog-link" href="blog/">閱讀無聊的小論文</a>
      <span class="blog-hint blog-hint-desktop" aria-hidden="true">← Click here</span>
      <span class="blog-hint blog-hint-mobile" aria-hidden="true">Click here ↑</span>
    </div>
    <div class="blog-action album-action">
      <a class="album-link" href="album/">瀏覽實驗相本</a>
      <span class="blog-hint blog-hint-desktop" aria-hidden="true">← Click here</span>
      <span class="blog-hint blog-hint-mobile" aria-hidden="true">Click here ↑</span>
    </div>
  </main>
</body>
</html>
